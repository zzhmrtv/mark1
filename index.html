<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legalno.USA — AI Immigration Preparation</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FAFAFA;
            --bg-section: #F4F4F5;
            --card-bg: #FFFFFF;
            --card-hover: #FFFFFF;
            --border-color: #E4E4E7;
            --border-hover: #D4D4D8;
            --text-main: #18181B;
            --text-muted: #71717A;
            --text-disclaimer: #A1A1AA;
            --input-bg: #FFFFFF;
            --accent: #E27D60;
            --btn-primary: #18181B;
            --btn-primary-hover: #27272A;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Навигационная панель */
        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(250, 250, 250, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 1.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo-icon {
            color: var(--accent);
            font-size: 16px;
        }

        .nav-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: var(--bg-section);
            border-color: var(--border-hover);
        }

        /* Главный экран (Hero) */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(100px, 15vh, 16px) 20px 60px;
        }

        .hero-content {
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-family: 'Newsreader', Georgia, serif;
            font-size: clamp(36px, 6vw, 48px);
            font-weight: 400;
            line-height: 1.15;
            margin-bottom: 16px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        h1 span.italic {
            font-style: italic;
        }

        .subtitle {
            font-size: clamp(15px, 2vw, 16px) ;
            color: var(--text-muted);
            margin-bottom: 36px;
            line-height: 1.5;
        }

        /* Блок авторизации */
        .auth-box {
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: clamp(24px, 5vw, 36px) clamp(20px, 4vw, 28px) clamp(20px, 4vw, 28px);
            background: var(--card-bg);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
            margin-bottom: 24px;
            transition: var(--transition);
        }

        .auth-box:focus-within {
            border-color: var(--border-hover);
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.05);
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
        }

        .google-btn:hover {
            background: var(--bg-section);
            border-color: var(--border-hover);
        }

        .google-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .divider {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .input-email {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: var(--transition);
        }

        .input-email:focus {
            border-color: var(--text-muted);
            background: var(--card-bg);
        }

        .input-email::placeholder {
            color: #A1A1AA;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--btn-primary);
            border: none;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .submit-btn:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-1px);
        }

        .terms-text {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-top: 20px;
        }

        .terms-text a {
            color: var(--text-main);
            text-decoration: underline;
            transition: var(--transition);
        }

        /* Контентная секция */
        .section {
            padding: clamp(50px, 8vw, 90px) 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-section);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-family: 'Newsreader', Georgia, serif;
            font-size: clamp(28px, 4vw, 36px);
            font-weight: 400;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .section-sub {
            text-align: center;
            color: var(--text-muted);
            max-width: 460px;
            margin: 0 auto 48px;
            font-size: 15px;
        }

        /* Адаптивная CSS сетка карточек */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: clamp(24px, 4vw, 32px);
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.005);
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        /* Сетка блока статистики */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .stat {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        .stat h2 {
            font-family: 'Newsreader', Georgia, serif;
            font-size: clamp(32px, 4vw, 38px);
            font-weight: 400;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .stat p {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Дисклеймер и подвал */
        .footer-section {
            padding: 48px 20px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            background: var(--bg-main);
        }
