<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legalno.USA — AI Immigration Preparation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #131313;
            --bg-section: #181818;
            --card-bg: #1F1F1F;
            --card-hover: #262626;
            --border-color: #2A2A2A;
            --border-hover: #3A3A3A;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --text-disclaimer: #555555;
            --input-bg: #1A1A1A;
            --accent: #E27D60;
            --btn-primary: #F5F5F3;
            --btn-primary-hover: #E5E5E3;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(19, 19, 19, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 1.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo-icon {
            color: var(--accent);
            font-size: 16px;
        }

        .nav-btn {
            padding: 10px 18px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: var(--card-bg);
            border-color: var(--border-hover);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 24px 80px;
        }

        .hero-content {
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-family: 'Newsreader', Georgia, serif;
            font-size: clamp(40px, 5vw, 52px);
            font-weight: 400;
            line-height: 1.15;
            margin-bottom: 18px;
            color: #FFFFFF;
            letter-spacing: -0.5px;
        }

        h1 span.italic {
            font-style: italic;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Auth Box (SaaS conversion form) */
        .auth-box {
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px 28px 28px;
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(8px);
            margin-bottom: 24px;
            transition: var(--transition);
        }

        .auth-box:focus-within {
            border-color: var(--border-hover);
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--border-hover);
        }

        .google-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .divider {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 24px 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .input-email {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: var(--transition);
        }

        .input-email:focus {
            border-color: #555555;
            background: var(--bg-dark);
        }

        .input-email::placeholder {
            color: #555555;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--btn-primary);
            border: none;
            border-radius: 12px;
            color: #131313;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .submit-btn:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-1px);
        }

        .terms-text {
            font-size: 12px;
            color: #6B7280;
            line-height: 1.5;
            margin-top: 20px;
        }

        .terms-text a {
            color: #9CA3AF;
            text-decoration: underline;
            transition: var(--transition);
        }

        .terms-text a:hover {
            color: var(--text-main);
        }

        /* Features Section */
        .section {
            padding: clamp(60px, 10vw, 100px) 24px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-section);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-family: 'Newsreader', Georgia, serif;
            font-size: clamp(30px, 4vw, 40px);
            font-weight: 400;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .section-sub {
            text-align: center;
            color: var(--text-muted);
            max-width: 480px;
            margin: 0 auto 56px;
            font-size: 16px;
        }

        /* Grid Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 32px;
            border-radius: 20px;
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--card-hover);
            transform: translateY(-2px);
        }

        .card h3 {
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card p {
            color: var(--text-muted);
            font-size: 14.5px;
            line-height: 1.6;
        }

        /* Stats Block */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .stat {
            text-align: center;
            padding: 24px;
            background: rgba(25, 25, 25, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        .stat h2 {
            font-family: 'Newsreader', Georgia, serif;
            font-size: 36px;
            font-weight: 400;
            color: #FFFFFF;
            margin-bottom: 6px;
        }

        .stat p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Footer & Legal */
        .footer-section {
            padding: 60px 24px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            background: var(--bg-dark);
        }

        .warning {
            font-size: 12px;
            color: var(--text-disclaimer);
            max-width: 600px;
            margin: 0 auto 32px;
            line-height: 1.6;
        }

        .footer {
            color: var(--text-disclaimer);
